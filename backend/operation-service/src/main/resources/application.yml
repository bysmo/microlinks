server:
  port: 8083

spring:
  application:
    name: operation-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/operation_db}
    username: ${SPRING_DATASOURCE_USERNAME:microlinks}
    password: ${SPRING_DATASOURCE_PASSWORD:MicroLinks@2024}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    change-log: classpath:db/changelog/master.xml

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: ${SPRING_RABBITMQ_USERNAME:microlinks}
    password: ${SPRING_RABBITMQ_PASSWORD:RabbitMQ@2024}

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: 6379
      password: ${SPRING_REDIS_PASSWORD:}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8443}/realms/${KEYCLOAK_REALM:microlinks}

# Configuration RabbitMQ Exchanges et Queues
microlinks:
  rabbitmq:
    exchange: microlinks.operations.exchange
    routing-keys:
      operation-created: operation.created
      operation-validated: operation.validated
      operation-rejected: operation.rejected
      operation-completed: operation.completed

# URL du service institution pour vérifications
institution-service:
  url: ${INSTITUTION_SERVICE_URL:http://localhost:8082}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

logging:
  level:
    com.microlinks: DEBUG
