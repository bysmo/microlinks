spring:
  application:
    name: sftp-service
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8443}/realms/${KEYCLOAK_REALM:microlinks}

server:
  port: 8087

# Configuration SFTP
sftp:
  # Expression cron de la collecte (configurable par l'admin SaaS via env var)
  # Valeur par défaut : toutes les 5 minutes
  polling:
    cron: ${SFTP_POLLING_CRON:0 */5 * * * *}
  # Clé de chiffrement pour les credentials SFTP (doit correspondre à celle de l'institution-service)
  encryption:
    key: ${SFTP_ENCRYPTION_KEY:MicroLinksSftp#Key256bits!Secure}

# URL de l'institution-service (accès interne réseau Docker)
institution:
  service:
    url: ${INSTITUTION_SERVICE_URL:http://localhost:8082}

# RabbitMQ
spring.rabbitmq:
  host: ${SPRING_RABBITMQ_HOST:localhost}
  port: 5672
  username: ${SPRING_RABBITMQ_USERNAME:microlinks}
  password: ${SPRING_RABBITMQ_PASSWORD:RabbitMQ@2024}

# Eureka
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.microlinks.sftp: INFO
    com.jcraft.jsch: WARN
