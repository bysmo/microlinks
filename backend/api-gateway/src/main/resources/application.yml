server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            # allowedOriginPatterns (et non allowedOrigins) est requis pour pouvoir
            # utiliser des jokers (*) tout en conservant allowCredentials=true.
            # Cela évite les erreurs CORS lorsque le frontend tourne sur un port de
            # dev (Vite: 5173/3000) ou derrière une URL de prévisualisation.
            allowedOriginPatterns:
              - "http://localhost:[*]"
              - "http://127.0.0.1:[*]"
              - "http://frontend:[*]"
              - "https://*.preview.abacusai.app"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - Content-Disposition
            allowCredentials: true
            maxAge: 3600

      routes:
        - id: institution-service
          uri: http://institution-service:8082
          predicates:
            - Path=/api/v1/institutions/**, /api/v1/agences/**, /api/v1/comptes/**, /api/v1/zones-monetaires/**
          filters:
            - name: CircuitBreaker
              args:
                name: institutionCB
                fallbackUri: forward:/fallback

        - id: operation-service
          uri: http://operation-service:8083
          predicates:
            - Path=/api/v1/operations/**, /api/v1/clients/**
          filters:
            - name: CircuitBreaker
              args:
                name: operationCB
                fallbackUri: forward:/fallback

        - id: rapport-service
          uri: http://rapport-service:8084
          predicates:
            - Path=/api/v1/rapports/**, /api/v1/exports/**
          filters:
            - name: CircuitBreaker
              args:
                name: rapportCB
                fallbackUri: forward:/fallback

        - id: notification-service-ws
          uri: ws://notification-service:8085
          predicates:
            - Path=/ws/**

        - id: notification-service
          uri: http://notification-service:8085
          predicates:
            - Path=/api/v1/notifications/**

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8443}/realms/${KEYCLOAK_REALM:microlinks}
          jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8443}/realms/${KEYCLOAK_REALM:microlinks}/protocol/openid-connect/certs

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

resilience4j:
  circuitbreaker:
    instances:
      institutionCB:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
      operationCB:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO
