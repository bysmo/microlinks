

networks:
  microlinks-net:
    driver: bridge

volumes:
  postgres-institution-data:
  postgres-operation-data:
  postgres-rapport-data:
  postgres-notification-data:
  postgres-billing-data:
  keycloak-data:
  redis-data:
  rabbitmq-data:

services:

  # ============================================
  # INFRASTRUCTURE
  # ============================================

  postgres-institution:
    image: postgres:16-alpine
    container_name: ml-postgres-institution
    environment:
      POSTGRES_DB: institution_db
      POSTGRES_USER: ${POSTGRES_USER:-microlinks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-MicroLinks@2024}
    volumes:
      - postgres-institution-data:/var/lib/postgresql/data
    networks:
      - microlinks-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-microlinks} -d institution_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-operation:
    image: postgres:16-alpine
    container_name: ml-postgres-operation
    environment:
      POSTGRES_DB: operation_db
      POSTGRES_USER: ${POSTGRES_USER:-microlinks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-MicroLinks@2024}
    volumes:
      - postgres-operation-data:/var/lib/postgresql/data
    networks:
      - microlinks-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-microlinks} -d operation_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-rapport:
    image: postgres:16-alpine
    container_name: ml-postgres-rapport
    environment:
      POSTGRES_DB: rapport_db
      POSTGRES_USER: ${POSTGRES_USER:-microlinks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-MicroLinks@2024}
    volumes:
      - postgres-rapport-data:/var/lib/postgresql/data
    networks:
      - microlinks-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-microlinks} -d rapport_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-notification:
    image: postgres:16-alpine
    container_name: ml-postgres-notification
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: ${POSTGRES_USER:-microlinks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-MicroLinks@2024}
    volumes:
      - postgres-notification-data:/var/lib/postgresql/data
    networks:
      - microlinks-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-microlinks} -d notification_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-billing:
    image: postgres:16-alpine
    container_name: ml-postgres-billing
    environment:
      POSTGRES_DB: billing_db
      POSTGRES_USER: ${POSTGRES_USER:-microlinks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-MicroLinks@2024}
    volumes:
      - postgres-billing-data:/var/lib/postgresql/data
    networks:
      - microlinks-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-microlinks} -d billing_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ml-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-Redis@2024}
    volumes:
      - redis-data:/data
    networks:
      - microlinks-net
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-Redis@2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ml-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-microlinks}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-RabbitMQ@2024}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "15672:15672"  # Management UI
    networks:
      - microlinks-net
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 15s
      timeout: 10s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: ml-keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: dev-file
      KC_HEALTH_ENABLED: "true"
    command: ["start-dev", "--import-realm"]
    volumes:
      - ./infrastructure/keycloak/realm-microlinks.json:/opt/keycloak/data/import/realm-microlinks.json
      - ./infrastructure/keycloak/themes:/opt/keycloak/themes
      - keycloak-data:/opt/keycloak/data
    ports:
      - "8443:8080"
    networks:
      - microlinks-net
    # Pas de healthcheck : l'image ubi9-micro ne contient ni curl ni wget.
    # Les services dépendants utilisent service_started + restart:on-failure.

  adminer:
    image: adminer
    container_name: ml-adminer
    ports:
      - "8089:8080"
    networks:
      - microlinks-net


  discovery-service:
    build:
      context: ./infrastructure/discovery-service
      dockerfile: Dockerfile
    container_name: ml-discovery-service
    restart: on-failure
    ports:
      - "8761:8761"
    networks:
      - microlinks-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8761/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  config-service:
    build:
      context: ./infrastructure/config-service
      dockerfile: Dockerfile
    container_name: ml-config-service
    restart: on-failure
    environment:
      SPRING_PROFILES_ACTIVE: native,docker
    ports:
      - "8888:8888"
    networks:
      - microlinks-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8888/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      discovery-service:
        condition: service_healthy

  api-gateway:
    build:
      context: ./infrastructure/api-gateway
      dockerfile: Dockerfile
    container_name: ml-api-gateway
    restart: on-failure
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-microlinks}
      INSTITUTION_SERVICE_URL: http://institution-service:8082
      OPERATION_SERVICE_URL: http://operation-service:8083
      RAPPORT_SERVICE_URL: http://rapport-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8085
      BILLING_SERVICE_URL: http://billing-service:8086
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-Redis@2024}
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka/
      CONFIG_SERVER_URL: http://config-service:8888
    ports:
      - "8080:8080"
    networks:
      - microlinks-net
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      keycloak:
        condition: service_started
      institution-service:
        condition: service_started

  institution-service:
    build:
      context: ./backend/institution-service
      dockerfile: Dockerfile
    container_name: ml-institution-service
    restart: on-failure
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-institution:5432/institution_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-microlinks}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-MicroLinks@2024}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-Redis@2024}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-microlinks}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-KeycloakAdmin@2024#}
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka/
      CONFIG_SERVER_URL: http://config-service:8888
    networks:
      - microlinks-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8082/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      postgres-institution:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started

  operation-service:
    build:
      context: ./backend/operation-service
      dockerfile: Dockerfile
    container_name: ml-operation-service
    restart: on-failure
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-operation:5432/operation_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-microlinks}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-MicroLinks@2024}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-Redis@2024}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-microlinks}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-RabbitMQ@2024}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-microlinks}
      INSTITUTION_SERVICE_URL: http://institution-service:8082
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka/
      CONFIG_SERVER_URL: http://config-service:8888
    networks:
      - microlinks-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8083/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      postgres-operation:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      institution-service:
        condition: service_started

  rapport-service:
    build:
      context: ./backend/rapport-service
      dockerfile: Dockerfile
    container_name: ml-rapport-service
    restart: on-failure
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-rapport:5432/rapport_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-microlinks}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-MicroLinks@2024}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-microlinks}
      OPERATION_SERVICE_URL: http://operation-service:8083
      INSTITUTION_SERVICE_URL: http://institution-service:8082
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka/
      CONFIG_SERVER_URL: http://config-service:8888
    networks:
      - microlinks-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8084/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      postgres-rapport:
        condition: service_healthy
      operation-service:
        condition: service_started

  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    container_name: ml-notification-service
    restart: on-failure
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-notification:5432/notification_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-microlinks}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-MicroLinks@2024}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-microlinks}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-RabbitMQ@2024}
      SPRING_MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-microlinks}
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka/
      CONFIG_SERVER_URL: http://config-service:8888
    networks:
      - microlinks-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8085/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      postgres-notification:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_started

  billing-service:
    build:
      context: ./backend/billing-service
      dockerfile: Dockerfile
    container_name: ml-billing-service
    restart: on-failure
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-billing:5432/billing_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-microlinks}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-MicroLinks@2024}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-microlinks}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-RabbitMQ@2024}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-microlinks}
      INSTITUTION_SERVICE_URL: http://institution-service:8082
      MICROLINKS_SERVICE_ACCOUNT_CLIENT_ID: ${BILLING_SA_CLIENT_ID:-billing-service}
      MICROLINKS_SERVICE_ACCOUNT_CLIENT_SECRET: ${BILLING_SA_CLIENT_SECRET:-}
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka/
      CONFIG_SERVER_URL: http://config-service:8888
    networks:
      - microlinks-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8086/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      postgres-billing:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_started

  # ============================================
  # SFTP FILE EXCHANGE SERVICE
  # ============================================

  sftp-service:
    build:
      context: ./backend/sftp-service
      dockerfile: Dockerfile
    container_name: ml-sftp-service
    restart: on-failure
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-microlinks}
      INSTITUTION_SERVICE_URL: http://institution-service:8082
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-microlinks}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-RabbitMQ@2024}
      # Cron de collecte configurable par l'admin SaaS (défaut : toutes les 5 minutes)
      SFTP_POLLING_CRON: ${SFTP_POLLING_CRON:-0 */5 * * * *}
      # Clé de chiffrement AES-256 pour les credentials SFTP (doit correspondre à institution-service)
      SFTP_ENCRYPTION_KEY: ${SFTP_ENCRYPTION_KEY:-MicroLinksSftp#Key256bits!Secure}
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka/
      CONFIG_SERVER_URL: http://config-service:8888
    networks:
      - microlinks-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8087/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      institution-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_started

  # ============================================
  # FRONTEND
  # ============================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8443}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-microlinks}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-microlinks-frontend}
    container_name: ml-frontend
    ports:
      - "3000:80"
    networks:
      - microlinks-net
    depends_on:
      - api-gateway
